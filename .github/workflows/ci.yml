name: ci
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# NOTE: build / vet / golangci-lint / govulncheck for comms require cgo and
# TDLib (libtdjson.so + headers), which stock runners lack. Those checks run
# locally (developers have TDLib) or via scripts/build-linux-portable.sh in
# Docker. CI here is limited to the pure-Go format gate so it never reports a
# spurious failure from a missing native toolchain.
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - name: gofmt -s
        run: |
          fmtout="$(gofmt -s -l .)"
          if [ -n "$fmtout" ]; then echo "unformatted files:"; echo "$fmtout"; exit 1; fi
